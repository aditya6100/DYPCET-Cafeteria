<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DYPCET Cafeteria</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/alerts.css">
</head>
<body class="auth-page">
    <header>
        <div class="header-left">
            <a href="/index.html" class="header-logo-link">
                <img src="/assets/dyplogo.png" alt="DYPCET Logo" class="header-logo">
                <h1>DYPCET Cafeteria</h1>
            </a>
        </div>
        <div class="header-right"><nav><ul></ul></nav></div>
    </header>
    <main class="container">
        <div class="auth-card">
            <h2>Register</h2>
            <form id="register-form">
                <div class="input-group"><label for="name">Full Name</label><input type="text" id="name" required></div>
                <div class="input-group"><label for="email">Email</label><input type="email" id="email" required></div>
                <div class="input-group"><label for="password">Password</label><input type="password" id="password" required></div>
                <div class="input-group"><label for="mobile_no">Mobile Number</label><input type="tel" id="mobile_no" required></div>
                <div class="input-group">
                    <label for="user_type">Register As</label>
                    <select id="user_type"><option value="student">Student</option><option value="faculty">Faculty</option><option value="visitor">Visitor</option></select>
                </div>
                <button type="submit" class="button">Register</button>
            </form>
            <p>Already have an account? <a href="/login.html">Login here</a>.</p>
        </div>
    </main>
    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
