<!-- profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Profile - DYPCET Cafeteria</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/alerts.css">
</head>
<body class="profile-page">
    <header>
        <div class="header-left"><a href="/index.html" class="header-logo-link"><img src="/assets/dyplogo.png" alt="DYPCET Logo" class="header-logo"><h1>DYPCET Cafeteria</h1></a></div>
        <div class="header-right"><nav><ul></ul></nav></div>
    </header>
    <main class="container">
        <div class="auth-card">
            <h2>Your Profile</h2>
            <form id="profile-form">
                <div class="input-group"><label for="profile-name">Name</label><input type="text" id="profile-name"></div>
                <div class="input-group"><label for="profile-email">Email</label><input type="email" id="profile-email" disabled></div>
                <div class="input-group"><label for="profile-mobile">Mobile</label><input type="tel" id="profile-mobile"></div>
                <button type="submit" class="button">Update Profile</button>
            </form>
        </div>
        <div class="auth-card" style="margin-top: 2rem;">
            <h3>Submit Feedback</h3>
            <form id="feedback-form">
                <div class="input-group"><label for="feedback-subject">Subject</label><input type="text" name="subject" required></div>
                <div class="input-group"><label for="feedback-message">Message</label><textarea name="message" rows="4" required></textarea></div>
                <button type="submit" class="button">Submit Feedback</button>
            </form>
        </div>
    </main>
    <footer><div class="container"><p>&copy; 2024 DYPCET Cafeteria.</p></div></footer>
    <script src="/js/common.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
